schema_version: "1.0"

extension:
  id: companion
  name: "SpecKit Companion"
  version: "0.18.0"
  description: "Live spec-driven progress for SpecKit Companion — lifecycle capture, status, and resume."
  author: alfredoperez
  repository: https://github.com/alfredoperez/speckit-companion
  homepage: https://github.com/alfredoperez/speckit-companion/tree/main/speckit-extension
  license: MIT

requires:
  # Floor is the workflow-engine surface the Companion workflow rides:
  # `specify workflow run`/`resume` plus the `command`/`gate`/`switch` step
  # registry, all present from the 0.9.5 engine. Bare floor: spec-kit stable is
  # well past this (0.11.x), so git/`uv` dev builds report `0.11.x.devN`, which
  # PEP 440 admits against `>=0.9.5`. A `.dev0` suffix would only matter if this
  # floor were the same line HEAD currently builds — it isn't.
  speckit_version: ">=0.9.5"
  tools:
    - name: python3
      required: false

provides:
  commands:
    - name: speckit.companion.capture
      file: commands/speckit.companion.capture.md
      description: "Capture the current spec-kit step into .spec-context.json for the Companion GUI"
    - name: speckit.companion.capture-plan
      file: commands/speckit.companion.capture-plan.md
      description: "Capture plan completion (currentStep=plan, status=planned) into .spec-context.json"
    - name: speckit.companion.capture-tasks
      file: commands/speckit.companion.capture-tasks.md
      description: "Capture tasks completion (currentStep=tasks, status=ready-to-implement) into .spec-context.json"
    - name: speckit.companion.capture-implement
      file: commands/speckit.companion.capture-implement.md
      description: "Capture per-task implement progress (currentStep=implement) into .spec-context.json"
    - name: speckit.companion.status
      file: commands/speckit.companion.status.md
      description: "Report the active spec's current step, status, decisions, and next action from .spec-context.json"
    - name: speckit.companion.resume
      file: commands/speckit.companion.resume.md
      description: "Resume the pipeline from the recorded step with decisions in scope, dispatching the next command"
    - name: speckit.companion.specify
      file: commands/speckit.companion.specify.md
      description: "Companion specify — spec.md with no user-story section"
    - name: speckit.companion.plan
      file: commands/speckit.companion.plan.md
      description: "Companion plan — files/dependencies, conditional side files"
    - name: speckit.companion.tasks
      file: commands/speckit.companion.tasks.md
      description: "Companion tasks — files/dependencies axis"
    - name: speckit.companion.implement
      file: commands/speckit.companion.implement.md
      description: "Companion implement — dependency-ordered execution"
    - name: speckit.companion.classify
      file: commands/speckit.companion.classify.md
      description: "Classify change size (small | normal | oversized) for the Companion workflow routing step"
    - name: speckit.companion.mark-complete
      file: commands/speckit.companion.mark-complete.md
      description: "Terminal Companion step — write status: completed to .spec-context.json"
    - name: speckit.companion.auto
      file: commands/speckit.companion.auto.md
      description: "Run the whole Companion pipeline hands-off (specify → plan → tasks → implement → mark-complete), no approval pauses"
    - name: speckit.companion.adopt
      file: commands/speckit.companion.adopt.md
      description: "Brownfield adoption wizard — draft a living spec for ONE code area surface-first and register the capability (opt-in)"
    - name: speckit.companion.drift
      file: commands/speckit.companion.drift.md
      description: "Report living-spec drift — per capability, source files changed since the spec was last committed, classified tracked vs unspeced (opt-in, never halts)"
    - name: speckit.companion.coverage
      file: commands/speckit.companion.coverage.md
      description: "Report living-spec requirement→test coverage — per requirement, whether its coverage tier maps a test (opt-in, read-only, never halts)"

hooks:
  after_specify:
    command: speckit.companion.capture
    optional: false
    description: "Record specify completion (currentStep=specify, status=specified) into .spec-context.json"
  after_plan:
    command: speckit.companion.capture-plan
    optional: false
    description: "Record plan completion (currentStep=plan, status=planned) into .spec-context.json"
  after_tasks:
    command: speckit.companion.capture-tasks
    optional: false
    description: "Record tasks completion (currentStep=tasks, status=ready-to-implement) into .spec-context.json"
  after_implement:
    command: speckit.companion.capture-implement
    optional: false
    description: "Per-task journaling on implement (currentStep=implement; status=implemented when all tasks checked)"

tags:
  - "spec-driven-development"
  - "tracking"
  - "companion"
